name: CI

on:
  push:
    branches:
      - main
      - release/**
  pull_request:

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify release contract
        shell: pwsh
        run: >
          ./scripts/verify-release.ps1
          -PythonExe python
          -ValidationArtifactPath "release-validation-${{ matrix.os }}.json"
          -RequireCleanTree

      - name: Upload release validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-${{ matrix.os }}
          path: release-validation-${{ matrix.os }}.json
